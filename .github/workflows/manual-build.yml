name: manual-build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., 1.0.0)'
        required: true
        default: 'latest'
      is_latest:
        description: 'Also tag this build as "latest"?'
        type: boolean
        required: true
        default: false

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Calculate Docker tags
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          IS_LATEST="${{ github.event.inputs.is_latest }}"
          
          # Base tags using the provided version
          TAGS="johannvr/uxplay-web:${TAG},ghcr.io/johannvr/uxplay-web:${TAG}"
          
          # Conditionally append 'latest' tags if the boolean is true
          if [ "$IS_LATEST" = "true" ]; then
            TAGS="${TAGS},johannvr/uxplay-web:latest,ghcr.io/johannvr/uxplay-web:latest"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
